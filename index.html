<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="保质岛">
  <meta name="theme-color" content="#78C850">
  <title>保质岛 - 家庭物品管理</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <div class="top-bar-inner">
        <span class="logo-leaf">🍃</span>
        <span class="app-title">保质岛</span>
        <button class="bell-btn" id="bell-btn" title="提醒">
          <span class="bell-icon">🔔</span>
          <span class="bell-badge hidden" id="bell-badge">0</span>
        </button>
      </div>
    </header>

    <main class="main-content">
      <div id="view-home" class="view"></div>
      <div id="view-inventory" class="view hidden"></div>
      <div id="view-add" class="view hidden"></div>
      <div id="view-settings" class="view hidden"></div>
    </main>

    <nav class="tabbar">
      <button class="tab-btn active" data-tab="home">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">首页</span>
      </button>
      <button class="tab-btn" data-tab="inventory">
        <span class="tab-icon">📦</span>
        <span class="tab-label">库存</span>
      </button>
      <button class="tab-btn add-btn" data-tab="add">
        <span class="tab-icon-add">+</span>
      </button>
      <button class="tab-btn" data-tab="settings">
        <span class="tab-icon">⚙️</span>
        <span class="tab-label">设置</span>
      </button>
    </nav>

    <!-- Detail Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-sheet" id="modal-sheet">
        <div class="modal-handle"></div>
        <div id="modal-content" class="modal-content"></div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
